[package]
name = "coindex"
version = "0.1.0"
edition = "2024"
description = "GitHub Copilot External Ingest CLI — build semantic index and search code"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.13", features = ["json", "rustls", "form"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "6"
sha1 = "0.10"
sha2 = "0.11"
hex = "0.4"
futures = "0.3"
wasmtime = { version = "31", default-features = false, features = ["cranelift", "gc", "gc-drc", "runtime", "std"] }
